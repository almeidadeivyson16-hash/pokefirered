name: Build GBA ROM
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi build-essential libpng-dev
    - name: Make ROM
      run: make firered
    - name: Upload ROM
      uses: actions/upload-artifact@v4
      with:
        name: FireRed-Rom
        path: pokefirered.gba
